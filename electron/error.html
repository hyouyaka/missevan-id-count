<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline';">
    <title>MM Toolkit</title>
    <style>
      :root { color-scheme: light; font-family: "Segoe UI", system-ui, sans-serif; background: #f6f1e8; color: #1f2a37; }
      body { margin: 0; padding: 32px; }
      main { max-width: 680px; margin: 8vh auto; padding: 28px; border: 1px solid #d7cfc2; border-radius: 16px; background: #fffdf9; box-shadow: 0 12px 36px rgba(50, 40, 25, .12); }
      h1 { margin-top: 0; font-size: 1.35rem; }
      p { line-height: 1.6; white-space: pre-wrap; overflow-wrap: anywhere; }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Desktop app failed to start</h1>
      <p id="message">Please close the app and try again.</p>
    </main>
    <script src="error.js"></script>
  </body>
</html>
